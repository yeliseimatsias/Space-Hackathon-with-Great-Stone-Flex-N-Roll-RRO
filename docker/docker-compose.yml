services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: flexnroll
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d flexnroll"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 15s

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic -c alembic/alembic.ini upgrade head
      && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
